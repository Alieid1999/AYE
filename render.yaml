services:
  - type: web
    name: aye-telegram-gateway
    env: python
    plan: free
    rootDir: .
    buildCommand: pip install -r requirements.txt
    startCommand: python telegram_gateway.py
    healthCheckPath: /status
    autoDeploy: true
    envVars:
      - key: PORT
        value: 8000
      - key: TELEGRAM_API_ID
        sync: false
      - key: TELEGRAM_API_HASH
        sync: false
      - key: TELEGRAM_SESSION
        sync: false
      - key: TELEGRAM_GATEWAY_API_KEY
        sync: false
      - key: TELEGRAM_ADMIN_CHAT_ID
        sync: false
      - key: WHATSAPP_GATEWAY_URL
        sync: false
